        <path d="M 40 0 L 60 0 L 60 40 L 100 40 L 100 60 L 60 60 L 60 100 L 40 100 L 40 60 L 0 60 L 0 40 L 40 40 Z" fill="#10b981" />
    </g>
    
    <!-- Tech Nodes / Data Points -->
    <circle cx="380" cy="150" r="12" fill="url(#techGrad)" />
    <circle cx="430" cy="220" r="8" fill="url(#techGrad)" />
    <circle cx="350" cy="270" r="15" fill="url(#techGrad)" />
    
