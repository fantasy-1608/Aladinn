<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Aladinn — Trợ lý VNPT HIS</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <img src="../assets/icons/aladinn-vector.svg" class="genie-img" alt="Aladinn" id="genie-logo">
                <span class="app-title">Aladinn</span>
            </div>
            <div class="header-right">
                <span class="status-dot" id="connection-dot" title="Trạng thái kết nối"></span>
                <div class="version-badge">v...</div>
            </div>
        </header>

        <!-- Feature Toggles — Compact Chips -->
        <div class="feature-toggles">
            <label class="toggle-chip active" id="chip-scanner">
                <svg class="chip-icon" viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                <span>Scanner</span>
                <input type="checkbox" id="toggle-scanner" checked>
            </label>
            <label class="toggle-chip active" id="chip-voice">
                <svg class="chip-icon" viewBox="0 0 24 24"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>
                <span>AI</span>
                <input type="checkbox" id="toggle-voice" checked>
            </label>
            <label class="toggle-chip active" id="chip-sign">
                <svg class="chip-icon" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                <span>Ký số</span>
                <input type="checkbox" id="toggle-sign" checked>
            </label>
            <label class="toggle-chip active" id="chip-cds">
                <svg class="chip-icon" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
                <span>CDS</span>
                <input type="checkbox" id="toggle-cds" checked>
            </label>
        </div>

        <!-- Update Banner (hidden by default) -->
        <div class="update-banner" id="update-banner">
            <div class="update-content">
                <svg class="al-icon al-icon-sm update-icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <div>
                    <div class="update-title">Bản mới <span id="update-version"></span></div>
                    <div class="update-desc" id="update-changelog"></div>
                </div>
            </div>
            <div class="update-actions">
                <a class="update-btn update-btn-primary" id="update-download-btn" href="#" target="_blank">Tải về</a>
                <button class="update-btn update-btn-secondary" id="update-dismiss-btn">Bỏ qua</button>
            </div>
        </div>

        <div class="main-content">
            <!-- Patient Context Card -->
            <div class="patient-card empty" id="patient-card">
                <span class="patient-empty-text">
                    <svg class="al-icon al-icon-sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Chọn bệnh nhân trên danh sách
                </span>
            </div>



            <!-- Scanner Section -->
            <div id="section-scanner">
                <div class="section-label">
                    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/></svg>
                    Quét dữ liệu
                </div>
                <div class="action-grid" id="grid-scanner">
                    <div id="show-dashboard-btn" class="action-btn primary full-width">
                        <svg class="al-icon action-icon" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                        Bảng Điều Khiển & Thống kê
                    </div>
                    <div id="scan-room-btn" class="action-btn">
                        <span class="btn-emoji">🏥</span>
                        Quét Buồng
                    </div>
                    <div id="scan-drugs-btn" class="action-btn">
                        <span class="btn-emoji">💊</span>
                        Quét Thuốc
                    </div>
                    <div id="ai-lab-summary-btn" class="action-btn">
                        <span class="btn-emoji">✨</span>
                        Tóm tắt CLS
                    </div>
                    <div id="scan-pttt-btn" class="action-btn">
                        <span class="btn-emoji">✂️</span>
                        Quét PTTT
                    </div>
                    <div id="scan-bhyt-btn" class="action-btn compact full-width" style="border-color: rgba(212, 168, 83, 0.25); color: var(--al-gold);">
                        <span>🛡️</span>
                        Quét BHYT
                    </div>
                </div>
            </div>

            <!-- Sign Section — Compact -->
            <div id="section-sign">
                <div class="section-label">
                    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                    Ký số hồ sơ
                </div>
                <div class="sign-compact">
                    <div class="sign-label">
                        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                        <span id="sign-status-text">Smart CA — sẵn sàng</span>
                    </div>
                    <div class="sign-actions">
                        <button id="sign-select-all-btn" class="sign-btn">Chọn hết</button>
                        <button id="sign-start-btn" class="sign-btn primary">Ký</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <button id="open-options-btn" class="footer-btn">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Cài đặt
        </button>
        <button id="clear-cache-btn" class="footer-btn danger" title="Xóa cache bộ nhớ">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Xóa cache
        </button>
        <div class="author-info">Huỳnh Trung Anh</div>
    </footer>
    <script type="module" src="popup.js"></script>
</body>
</html>
